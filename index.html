<!DOCTYPE html>
<!-- ================================================================
     TABLA DE ETIQUETAS USADAS EN ESTA PÁGINA
     ================================================================
     Etiqueta / Atrib.    Función
     ──────────────────   ──────────────────────────────────────────
     <header>             Cabecera con la barra de navegación
     <nav>                Bloque semántico de navegación
     <ul> / <li>          Lista del menú sin orden ni viñetas
     <a>                  Enlace; href= indica la página de destino
     class="active"       Subraya en dorado el enlace de la página actual
     <main>               Área de contenido principal
     <section>            Agrupa contenido relacionado semánticamente
     <h1>                 Título principal (solo uno por página)
     <h2>                 Subtítulo de segundo nivel
     <p>                  Párrafo de texto
     <img>                Imagen; src= ruta, alt= texto de accesibilidad
     width=               Ancho de la imagen (% o px)
     <footer>             Pie de página
     lang=                Idioma del documento (es = español)
     ================================================================ -->
<!-- ================================================================
     PÁGINA: Inicio | index.html
     ================================================================
     Qué ve el usuario:
     La página principal del sitio. Muestra el nombre del autor,
     su rol como estudiante, un mensaje de bienvenida y una foto
     de paisaje de Japón.

     Estructura:
       <header>  → barra de navegación superior (fondo negro, línea dorada inferior)
       <main>    → tarjeta de presentación personal + fotografía
       <footer>  → franja oscura con los derechos del sitio
     ================================================================ -->
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/style.css">
    <title>Inicio</title>
</head>

<body>

    <!-- ── HEADER ──────────────────────────────────────────────────────
         Barra de navegación del sitio. Fondo negro con gradiente azul
         y línea dorada inferior. class="active" subraya el enlace
         de la página actual en dorado.
         ─────────────────────────────────────────────────────────────── -->
    <header>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="listas.html">Listas</a></li>
                <li><a href="peliculas.html">Películas</a></li>
                <li><a href="series.html">Series</a></li>
                <li><a href="sobre_mi.html">Sobre mí</a></li>
                <li><a href="tablas.html">Tablas</a></li>
                <li><a href="formulario.php">Formulario</a></li>
            </ul>
        </nav>
    </header>

    <!-- ── MAIN ────────────────────────────────────────────────────────
         Contenido principal de esta página.
         ─────────────────────────────────────────────────────────────── -->
    <main>

        <!-- ── Tarjeta de presentación ────────────────────────────────
             Fondo amarillo con franja roja izquierda. Al pasar el
             mouse el fondo cambia a dorado (hover definido en style.css).
             ─────────────────────────────────────────────────────────── -->
        <section class="datos">
            <h1>Carlos Sanchez Gonzalez</h1>
            <h2>Estudiante</h2>
            <p>Bienvenidos a mi página</p>
        </section>

        <!-- ── Fotografía de portada ───────────────────────────────────
             width="50%" → ocupa la mitad del ancho de su contenedor.
             alt="..."   → texto alternativo para lectores de pantalla.
             ─────────────────────────────────────────────────────────── -->
        <section class="imgs">
            <img src="assets/20251230_OHR.JapanSwans_ROW0913401353_UHD_bing.jpg" width="50%" alt="Japan swans on water">
        </section>

    </main>

    <!-- ── FOOTER ──────────────────────────────────────────────────────
         Pie de página idéntico en todas las páginas del sitio.
         ─────────────────────────────────────────────────────────────── -->
    <footer>
        Derechos Reservados Producciones h777
    </footer>

</body>
</html>
