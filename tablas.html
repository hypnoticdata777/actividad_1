<!DOCTYPE html>
<!-- ================================================================
     TABLA DE ETIQUETAS USADAS EN ESTA PÁGINA
     ================================================================
     Etiqueta / Atrib.    Función
     ──────────────────   ──────────────────────────────────────────
     <!DOCTYPE html>      Declara que el documento es HTML5
     <html>               Elemento raíz que envuelve todo el documento
     lang=                Idioma del contenido (es = español)
     <head>               Configuración del documento (no visible)
     <meta charset>       UTF-8: permite acentos, ñ y caracteres especiales
     <meta viewport>      Adapta la página al ancho del dispositivo
     content=             Valor del meta tag
     <link rel>           Conecta el HTML con un archivo externo (CSS)
     href=                Ruta del archivo CSS o página de destino
     <title>              Texto que aparece en la pestaña del navegador
     <style>              Bloque de CSS local exclusivo para esta página
     <body>               Todo el contenido visible de la página
     <header>             Cabecera con la barra de navegación
     <nav>                Bloque semántico de navegación
     <ul>                 Lista sin orden (usada como menú)
     <li>                 Ítem de lista
     <a>                  Enlace a otra página
     class="active"       Subraya en dorado el enlace de la página actual
     <main>               Área de contenido principal
     <div>                Contenedor genérico sin semántica propia
     <input>              Campo de texto; en esta página se genera por JS al editar una fila
     type=                Tipo de campo (text, number, etc.)
     name=                Nombre del campo; sirve para identificarlo al enviar datos
     id=                  Identificador único; JS lo usa para encontrar el elemento
     placeholder=         Texto de ejemplo que aparece dentro del campo vacío
     <select>             Lista desplegable de opciones
     <optgroup>           Agrupa opciones relacionadas dentro de un <select> con un encabezado
     label=               Texto del encabezado del grupo en <optgroup> (no es seleccionable)
     <option>             Una opción dentro del <select>
     value=               Valor que se envía cuando se elige esa opción
     <button>             Botón interactivo que el usuario puede pulsar
     onclick=             Llama una función JavaScript cuando el usuario hace clic
     <table>              Tabla de datos con filas y columnas
     <thead>              Sección de encabezados de la tabla (fila con títulos de columna)
     <tbody>              Sección del cuerpo de la tabla; JS llena sus filas dinámicamente
     <tr>                 Fila de la tabla (table row)
     <th>                 Celda de encabezado; el CSS la muestra con fondo azul
     <td>                 Celda de dato normal dentro de una fila
     colspan=             Indica cuántas columnas debe ocupar una celda (para mensajes centrados)
     <script>             Bloque de código JavaScript que se ejecuta en el navegador
     <footer>             Pie de página que aparece al final de la pantalla
     ── JavaScript ───────────────────────────────────────────────────
     let                  Declara una variable cuyo valor puede cambiar después
     async function       Función que puede pausarse para esperar la respuesta del servidor
     await                Pausa la función hasta que el servidor responde; la página no se congela
     fetch()              Envía una petición HTTP al servidor (api.php) y espera la respuesta
     FormData             Objeto que empaqueta campos y valores para enviarlos al servidor
     .append()            Agrega un campo con su valor al objeto FormData antes de enviarlo
     document.addEventListener()  Espera a que la página termine de cargar para ejecutar código
     document.getElementById()    Busca y devuelve el elemento HTML que tenga ese id
     document.createElement()     Crea un nuevo elemento HTML en memoria (todavía no es visible)
     .appendChild()       Inserta el elemento creado al final de otro elemento del DOM
     .innerHTML           Lee o reemplaza el contenido HTML interno de un elemento
     .textContent         Lee el texto puro de un elemento sin interpretar etiquetas HTML
     .forEach()           Recorre cada elemento del array y ejecuta una función por cada uno
     .find()              Busca el primer elemento del array que cumpla la condición dada
     .querySelectorAll()  Busca todos los elementos que coincidan con un selector CSS
     .getAttribute()      Lee el valor de un atributo HTML de un elemento (ej: el onclick=)
     .value               Lee el valor actual escrito dentro de un input o seleccionado en un select
     .trim()              Elimina los espacios en blanco al inicio y al final de un texto
     .focus()             Mueve el cursor al campo para que el usuario pueda escribir de inmediato
     confirm()            Muestra un diálogo con "Aceptar" y "Cancelar"; devuelve true o false
     setTimeout()         Espera N milisegundos y luego ejecuta una función (ocultar el toast)
     .classList.add()     Agrega una clase CSS a un elemento para cambiar su apariencia
     .classList.remove()  Quita una clase CSS de un elemento (ej: oculta el toast)
     Template literal (`) Texto que puede incluir variables incrustadas: `Hola ${nombre}`
     ================================================================ -->

    <!-- ================================================================
         LÓGICA CRUD EN JAVASCRIPT
         ================================================================
         Flujo general:
           1. Al cargar la página, cargarRegistros() hace fetch a api.php
              para leer todos los registros desde MySQL y llenar la tabla.
           2. renderTabla() dibuja todas las filas en el <tbody>.
           3. agregarRegistro() valida y hace POST a api.php (action=create).
           4. editarFila(id) convierte la fila en inputs editables.
           5. guardarEdicion(id) hace POST a api.php (action=update) y recarga.
           6. cancelarEdicion() descarta cambios sin tocar la base de datos.
           7. eliminarRegistro(id) hace POST a api.php (action=delete) tras confirmación.
           8. Cada operación exitosa vuelve a cargar desde MySQL para mostrar
              siempre el estado real de la base de datos.
         ================================================================ -->
 <script>

        /* ── Estado en memoria ──────────────────────────────────────── */
        /* registros: copia local del array que viene de MySQL.
           Se sincroniza con la base de datos en cada operacion CRUD. */
        let registros = [];

        /* ── Inicializacion ─────────────────────────────────────────── */
        /* Cuando el DOM esta listo, cargamos los registros desde MySQL
           via fetch() a api.php con action=read. */
        document.addEventListener('DOMContentLoaded', function () {
            cargarRegistros();
        });

        /* ── cargarRegistros ────────────────────────────────────────── */
        /* Hace POST a api.php con action=read.
           PHP ejecuta SELECT * FROM registros y responde JSON.
           JS recibe el array, lo guarda en memoria y redibuja la tabla. */
        async function cargarRegistros() {
            try {
                const formData = new FormData();
                formData.append('action', 'read');

                const respuesta = await fetch('api.php', {
                    method: 'POST',
                    body:   formData
                });

                registros = await respuesta.json();
                renderTabla();

            } catch (error) {
                mostrarToast('Error al conectar con el servidor.');
                console.error('Error en cargarRegistros:', error);
            }
        }

        /* ── renderTabla ────────────────────────────────────────────── */
        /* Limpia el tbody y redibuja todas las filas desde el array.
           Muestra un mensaje si el array esta vacio. */
        function renderTabla() {
            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';

            if (registros.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="5" class="tabla-vacia">No hay registros. Agrega uno arriba.</td>';
                tbody.appendChild(tr);
                return;
            }

            registros.forEach(function (reg, index) {
                const tr = document.createElement('tr');

                const badgeClass = reg.categoria === 'Películas' ? 'badge-peliculas' : 'badge-series';
                const badgeHtml  = `<span class="badge ${badgeClass}">${escapeHtml(reg.categoria)}</span>`;

                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${escapeHtml(reg.titulo)}</td>
                    <td>${badgeHtml}</td>
                    <td>${escapeHtml(reg.asignado)}</td>
                    <td>
                        <div class="acciones-grupo">
                            <button class="btn-editar"   onclick="editarFila(${reg.id})">Editar</button>
                            <button class="btn-eliminar" onclick="eliminarRegistro(${reg.id})">Eliminar</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        /* ── agregarRegistro ────────────────────────────────────────── */
        /* Valida los campos y hace POST a api.php con action=create.
           PHP inserta el registro en MySQL y responde con el nuevo id. */
        async function agregarRegistro() {
            const titulo    = document.getElementById('input-titulo').value.trim();
            const categoria = document.getElementById('input-categoria').value;
            const asignado  = document.getElementById('input-asignado').value;

            if (!titulo || !categoria || !asignado) {
                mostrarToast('Por favor completa todos los campos.');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('action',    'create');
                formData.append('titulo',    titulo);
                formData.append('categoria', categoria);
                formData.append('asignado',  asignado);

                const respuesta = await fetch('api.php', { method: 'POST', body: formData });
                const data      = await respuesta.json();

                if (data.error) {
                    mostrarToast(data.error);
                    return;
                }

                document.getElementById('input-titulo').value    = '';
                document.getElementById('input-categoria').value = '';
                document.getElementById('input-asignado').value  = '';
                document.getElementById('input-titulo').focus();

                await cargarRegistros();
                mostrarToast('Registro agregado correctamente.');

            } catch (error) {
                mostrarToast('Error al agregar el registro.');
                console.error('Error en agregarRegistro:', error);
            }
        }

        /* ── titulosOptions ─────────────────────────────────────────── */
        /* Genera el HTML de los <option> para el select de titulo
           en modo edicion inline, marcando el valor actual como selected. */
        function titulosOptions(selected) {
            const titulos = [
                { group: '── Películas ──', items: ['Duelo de Titanes', 'Talladega Nights', 'The Matrix'] },
                { group: '── Series ──',    items: ['Reading Rainbow', 'Matlock', 'The Simpsons', 'Family Matters',
                    'Fresh Prince of Bel-Air', 'X-Men', 'The Magic School Bus', 'Arthur', 'Pokémon', 'Recess',
                    'Dragon Tales', 'Ed, Edd y Eddy', 'Digimon', 'Between the Lions', 'Yu-Gi-Oh!',
                    'The Grim Adventures of Billy & Mandy', 'Lost', 'Breaking Bad',
                    'The Walking Dead', 'Game of Thrones', 'Vikings', 'Better Call Saul'] }
            ];
            let html = '<option value="">Selecciona un título...</option>';
            titulos.forEach(function (group) {
                html += `<optgroup label="${group.group}">`;
                group.items.forEach(function (t) {
                    const sel = t === selected ? 'selected' : '';
                    html += `<option value="${escapeHtml(t)}" ${sel}>${escapeHtml(t)}</option>`;
                });
                html += '</optgroup>';
            });
            return html;
        }

        /* ── editarFila ─────────────────────────────────────────────── */
        /* Localiza la fila por id y reemplaza las celdas con inputs
           editables precargados con los valores actuales del registro. */
        function editarFila(id) {
            const reg = registros.find(r => r.id == id);
            if (!reg) return;

            const tbody = document.getElementById('tabla-body');
            const filas  = tbody.querySelectorAll('tr');
            let filaTarget = null;

            filas.forEach(function (tr) {
                const btn = tr.querySelector('.btn-editar');
                if (btn && btn.getAttribute('onclick') === `editarFila(${id})`) {
                    filaTarget = tr;
                }
            });

            if (!filaTarget) return;

            const numFila = filaTarget.cells[0].textContent;

            filaTarget.innerHTML = `
                <td>${numFila}</td>
                <td>
                    <select class="fila-edit-select" id="edit-titulo-${id}">
                        ${titulosOptions(reg.titulo)}
                    </select>
                </td>
                <td>
                    <select class="fila-edit-select" id="edit-categoria-${id}">
                        <option value="Películas" ${reg.categoria === 'Películas' ? 'selected' : ''}>Películas</option>
                        <option value="Series"    ${reg.categoria === 'Series'    ? 'selected' : ''}>Series</option>
                    </select>
                </td>
                <td>
                    <select class="fila-edit-select" id="edit-asignado-${id}">
                        <option value="Mariana"  ${reg.asignado === 'Mariana'  ? 'selected' : ''}>Mariana</option>
                        <option value="Eduardo"  ${reg.asignado === 'Eduardo'  ? 'selected' : ''}>Eduardo</option>
                        <option value="Rafael"   ${reg.asignado === 'Rafael'   ? 'selected' : ''}>Rafael</option>
                        <option value="Carlos"   ${reg.asignado === 'Carlos'   ? 'selected' : ''}>Carlos</option>
                    </select>
                </td>
                <td>
                    <div class="acciones-grupo">
                        <button class="btn-guardar"  onclick="guardarEdicion(${id})">Guardar</button>
                        <button class="btn-cancelar" onclick="cancelarEdicion()">Cancelar</button>
                    </div>
                </td>
            `;

            document.getElementById(`edit-titulo-${id}`).focus();
        }

        /* ── guardarEdicion ─────────────────────────────────────────── */
        /* Lee los inputs inline, valida, y hace POST a api.php
           con action=update. PHP ejecuta UPDATE en MySQL. */
        async function guardarEdicion(id) {
            const nuevoTitulo    = document.getElementById(`edit-titulo-${id}`).value.trim();
            const nuevaCategoria = document.getElementById(`edit-categoria-${id}`).value;
            const nuevoAsignado  = document.getElementById(`edit-asignado-${id}`).value;

            if (!nuevoTitulo) {
                mostrarToast('El título no puede estar vacío.');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('action',    'update');
                formData.append('id',        id);
                formData.append('titulo',    nuevoTitulo);
                formData.append('categoria', nuevaCategoria);
                formData.append('asignado',  nuevoAsignado);

                const respuesta = await fetch('api.php', { method: 'POST', body: formData });
                const data      = await respuesta.json();

                if (data.error) {
                    mostrarToast(data.error);
                    return;
                }

                await cargarRegistros();
                mostrarToast('Registro actualizado correctamente.');

            } catch (error) {
                mostrarToast('Error al actualizar el registro.');
                console.error('Error en guardarEdicion:', error);
            }
        }

        /* ── cancelarEdicion ────────────────────────────────────────── */
        /* Descarta cambios y redibuja la tabla desde el array local.
           No hace fetch porque no hubo ninguna modificacion en MySQL. */
        function cancelarEdicion() {
            renderTabla();
        }

        /* ── eliminarRegistro ───────────────────────────────────────── */
        /* Pide confirmacion y hace POST a api.php con action=delete.
           PHP ejecuta DELETE en MySQL. */
        async function eliminarRegistro(id) {
            const reg = registros.find(r => r.id == id);
            if (!reg) return;

            const confirmado = confirm(`¿Eliminar "${reg.titulo}"? Esta acción no se puede deshacer.`);
            if (!confirmado) return;

            try {
                const formData = new FormData();
                formData.append('action', 'delete');
                formData.append('id',     id);

                const respuesta = await fetch('api.php', { method: 'POST', body: formData });
                const data      = await respuesta.json();

                if (data.error) {
                    mostrarToast(data.error);
                    return;
                }

                await cargarRegistros();
                mostrarToast('Registro eliminado.');

            } catch (error) {
                mostrarToast('Error al eliminar el registro.');
                console.error('Error en eliminarRegistro:', error);
            }
        }

        /* ── mostrarToast ───────────────────────────────────────────── */
        /* Mensaje flotante temporal en la esquina inferior derecha. */
        function mostrarToast(mensaje) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.classList.add('visible');
            setTimeout(function () {
                toast.classList.remove('visible');
            }, 2500);
        }

        /* ── escapeHtml ─────────────────────────────────────────────── */
        /* Convierte caracteres especiales en entidades HTML para evitar
           XSS al insertar texto del usuario en el DOM con innerHTML. */
        function escapeHtml(texto) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(texto));
            return div.innerHTML;
        }

    </script>

</body>
</html>
