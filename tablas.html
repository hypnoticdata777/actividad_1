<!-- Le dice al navegador que este documento está en HTML5 -->
<!DOCTYPE html>

<!-- lang="es": corregido de "en" a "es" porque el contenido está en español -->
<html lang="es">

<!-- head: configuración de la página, no visible para el usuario -->
<head>
    <!-- UTF-8: permite usar acentos y caracteres especiales -->
    <meta charset="UTF-8">
    <!-- viewport: adapta la página a cualquier tamaño de pantalla -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Conecta con el CSS compartido que da estilo a todo el sitio -->
    <link rel="stylesheet" href="assets/style/style.css">
    <!-- Título que aparece en la pestaña del navegador -->
    <title>Tablas</title>
</head>

<!-- body: todo el contenido visible de la página -->
<body>

    <!-- header: zona superior con el menú de navegación.
         El nav se coloca dentro del header para seguir la misma estructura
         que el resto de las páginas del sitio (coherencia estructural) -->
    <header>
        <!-- nav: menú de navegación con enlaces a todas las páginas del sitio -->
        <nav>
            <!-- ul: lista sin orden para los ítems del menú -->
            <ul>
                <!-- Cada li tiene un enlace <a> que lleva a otra página al hacer clic -->
                <li><a href="index.html">Inicio</a></li>
                <li><a href="listas.html">Listas</a></li>
                <li><a href="peliculas.html">Películas</a></li>
                <li><a href="series.html">Series</a></li>
                <li><a href="sobre_mi.html">Sobre mí</a></li>
                <li><a href="tablas.html">Tablas</a></li>
                <li><a href="formulario.php">Formulario</a></li>
            </ul>
        </nav>
    </header>

    <!-- h1: título principal de esta página, fuera del nav para que sea el encabezado del contenido -->
    <h1>Tablas</h1>

    <!-- main: contiene las tablas HTML de práctica -->
    <main>
        <!-- table: estructura de datos en filas y columnas.
             El atributo border="1" ya no es necesario porque el CSS aplica los bordes,
             pero se mantiene aquí como referencia didáctica -->
        <table>
            <!-- thead: agrupa las filas de encabezado de la tabla (separado visualmente del cuerpo) -->
            <thead>
                <!-- tr: fila de la tabla (table row) -->
                <tr>
                    <!-- th: celda de encabezado (table header); el navegador la pone en negrita por defecto -->
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Ciudad</th>
                </tr>
            </thead>

            <!-- tbody: agrupa las filas de datos de la tabla -->
            <tbody>
                <!-- tr: cada fila de datos -->
                <tr>
                    <!-- td: celda de dato normal (table data) -->
                    <td>Felipe Smith</td>
                    <td>33</td>
                    <td>Chicago</td>
                </tr>
            </tbody>
        </table>
    </main>

    <!-- footer: pie de página con derechos, mismo texto que el resto del sitio para consistencia -->
    <footer>
        Derechos Reservados Producciones h777
    </footer>

</body>
</html>
