<!-- Le dice al navegador que este documento usa HTML5 -->
<!DOCTYPE html>

<!-- =========================================================================
     DOCUMENTO HTML - PÁGINA DE TABLAS
     =========================================================================

     ¿Qué es este archivo?
     Es una página web construida con HTML que muestra una tabla simple.
     Forma parte de un sitio más grande con navegación entre múltiples páginas.

     ¿Qué enseña esta página?
     - Estructura básica de un documento HTML
     - Uso de etiquetas semánticas (header, nav, main, footer)
     - Creación de tablas (table, thead, tbody, tr, th, td)
     - Conexión con CSS externo

     Flujo general de la página:
     Navegador carga HTML → HTML carga CSS → se renderiza el contenido visual
     ========================================================================= -->

<!-- =========================================================================
     ETIQUETA RAÍZ HTML
     =========================================================================

     lang="es":
     Indica que el idioma principal del contenido es español.

     ¿Por qué importa?
     - Mejora accesibilidad (lectores de pantalla)
     - Mejora SEO (Google entiende mejor el contenido)
     - Ayuda a herramientas de traducción
     ========================================================================= -->
<html lang="es">


<!-- =========================================================================
     HEAD (CONFIGURACIÓN INTERNA DE LA PÁGINA)
     =========================================================================

     Esta sección NO es visible para el usuario.
     Contiene configuraciones, metadatos y enlaces a recursos externos.
     ========================================================================= -->
<head>

    <!-- Define la codificación de caracteres -->
    <meta charset="UTF-8">
    <!-- Permite usar correctamente:
         á, é, í, ó, ú, ñ, símbolos, emojis, etc. -->

    <!-- Hace que la página sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Sin esto, la página se vería mal en celulares -->

    <!-- Conecta el archivo CSS externo -->
    <link rel="stylesheet" href="assets/style/style.css">
    <!-- Aquí es donde vive TODO el diseño visual:
         colores, márgenes, fuentes, etc. -->

    <!-- Título de la pestaña del navegador -->
    <title>Tablas</title>

</head>


<!-- =========================================================================
     BODY (CONTENIDO VISIBLE)
     =========================================================================

     Todo lo que está dentro de <body> es lo que el usuario ve en pantalla.
     ========================================================================= -->
<body>


    <!-- =====================================================================
         HEADER (ENCABEZADO DEL SITIO)
         =====================================================================

         Se usa para agrupar la parte superior de la página.
         Generalmente contiene:
         - logo
         - navegación
         - título del sitio
         ===================================================================== -->
    <header>

        <!-- ===============================================================
             NAV (MENÚ DE NAVEGACIÓN)
             ===============================================================

             Permite moverse entre las diferentes páginas del sitio.
             Es clave para la experiencia del usuario.
             =============================================================== -->
        <nav>

            <!-- Lista no ordenada (unordered list) -->
            <ul>

                <!-- Cada <li> representa un botón/enlace del menú -->

                <li><a href="index.html">Inicio</a></li>
                <!-- Página principal -->

                <li><a href="listas.html">Listas</a></li>
                <!-- Página de listas HTML -->

                <li><a href="peliculas.html">Películas</a></li>
                <!-- Página temática de películas -->

                <li><a href="series.html">Series</a></li>
                <!-- Página temática de series -->

                <li><a href="sobre_mi.html">Sobre mí</a></li>
                <!-- Página personal -->

                <li><a href="tablas.html" class="active">Tablas</a></li>
                <!-- Página actual -->

                <li><a href="formulario.php">Formulario</a></li>
                <!-- Página con backend (PHP) para enviar datos -->

            </ul>
        </nav>
    </header>


    <!-- =====================================================================
         MAIN (CONTENIDO PRINCIPAL)
         =====================================================================

         Aquí vive el contenido único de esta página.
         Cada página cambia el <main>, pero mantiene header/footer iguales.
         ===================================================================== -->
    <main>

        <!-- Título principal -->
        <h1>Tablas</h1>


        <!-- ===============================================================
             TABLA HTML
             ===============================================================

             Las tablas sirven para organizar datos en:
             - filas (rows)
             - columnas (columns)

             Estructura base:
             table
               ├── thead (encabezado)
               └── tbody (datos)
             =============================================================== -->
        <table>

            <!-- ===========================================================
                 THEAD (ENCABEZADO DE LA TABLA)
                 ===========================================================

                 Contiene los títulos de las columnas.
                 =========================================================== -->
            <thead>

                <!-- Fila -->
                <tr>

                    <!-- Encabezados de columna -->
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Ciudad</th>

                </tr>
            </thead>


            <!-- ===========================================================
                 TBODY (CUERPO DE LA TABLA)
                 ===========================================================

                 Contiene los datos reales.
                 =========================================================== -->
            <tbody>

                <!-- Fila de datos -->
                <tr>

                    <!-- Cada celda representa un dato -->
                    <td>Felipe Smith</td>
                    <td>33</td>
                    <td>Chicago</td>

                </tr>

            </tbody>
        </table>

    </main>


    <!-- =====================================================================
         FOOTER (PIE DE PÁGINA)
         =====================================================================

         Se usa para:
         - derechos de autor
         - información legal
         - contacto
         - branding

         Se mantiene consistente en todas las páginas.
         ===================================================================== -->
    <footer>
        Derechos Reservados Producciones h777
    </footer>

</body>
</html>
