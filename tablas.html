<!DOCTYPE html>
<!-- ================================================================
     PÁGINA: Tablas | tablas.html
     ================================================================
     Qué ve el usuario:
     Una tabla con encabezados en azul oscuro y datos organizados
     en filas. Las filas pares tienen fondo amarillo suave (zebra
     striping) para facilitar la lectura. Al pasar el mouse sobre
     una fila, el fondo cambia a azul translúcido.

     Estructura:
       <header>  → barra de navegación superior
       <main>    → título y tabla de datos con encabezados y filas
       <footer>  → pie de página con derechos
     ================================================================ -->
<html lang="es">
<!-- lang="es": indica al navegador y motores de búsqueda que el
     contenido está en español. Mejora accesibilidad y SEO. -->

<head>
    <meta charset="UTF-8">
    <!-- charset UTF-8: debe ser lo primero en <head>. Permite usar
         acentos, ñ y caracteres especiales sin que aparezcan rotos. -->

    <!-- viewport: adapta la página al tamaño de la pantalla del dispositivo.
         Sin esto, en celular la página se vería pequeñísima. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- link: conecta este HTML con el CSS compartido de todo el sitio.
         style.css controla colores, fuentes, espaciados y diseño visual. -->
    <link rel="stylesheet" href="assets/style/style.css">

    <!-- title: texto que aparece en la pestaña del navegador. -->
    <title>Tablas</title>
</head>

<body>

    <!-- ── HEADER ──────────────────────────────────────────────────────
         Barra de navegación superior, idéntica en todas las páginas.
         El CSS la pinta de negro con gradiente azul y línea dorada inferior.
         "Tablas" lleva class="active" → el CSS lo subraya en dorado
         para indicar visualmente que esta es la página actual.
         ─────────────────────────────────────────────────────────────── -->
    <header>
        <nav>
            <!-- ul: lista de ítems del menú. El CSS elimina las viñetas
                 y los muestra en fila horizontal con display:flex. -->
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="listas.html">Listas</a></li>
                <li><a href="peliculas.html">Películas</a></li>
                <li><a href="series.html">Series</a></li>
                <li><a href="sobre_mi.html">Sobre mí</a></li>
                <!-- class="active" → el CSS subraya este enlace en dorado -->
                <li><a href="tablas.html" class="active">Tablas</a></li>
                <li><a href="formulario.php">Formulario</a></li>
            </ul>
        </nav>
    </header>

    <!-- ── MAIN ────────────────────────────────────────────────────────
         Contenido principal de esta página.
         El <main> cambia en cada página; el header y el footer se repiten.

         Lo que ve el usuario aquí:
           Un título y una tabla con tres columnas (Nombre, Edad, Ciudad)
           y una fila de datos. Los encabezados tienen fondo azul oscuro
           con texto blanco en mayúsculas. Las filas pares se ven en
           amarillo suave y cambian a azul al pasar el mouse.
         ─────────────────────────────────────────────────────────────── -->
    <main>

        <!-- h1: título principal de la página, el más grande.
             Solo hay un <h1> por página (buena práctica de SEO y accesibilidad). -->
        <h1>Tablas</h1>

        <!-- table: elemento que organiza datos en filas y columnas.
             El CSS elimina el doble borde (border-collapse: collapse),
             limita el ancho máximo, agrega sombra y bordes redondeados.

             Estructura interna:
               <thead> → fila de encabezados (títulos de columna)
               <tbody> → filas de datos reales -->
        <table>

            <!-- thead: agrupa la fila de encabezados de la tabla.
                 El CSS le aplica fondo con gradiente azul oscuro, texto
                 blanco en mayúsculas y letra espaciada para que destaque
                 visualmente sobre las filas de datos. -->
            <thead>
                <tr>
                    <!-- th: celda de encabezado. El navegador la pone en negrita
                         por defecto; el CSS agrega el color azul y las mayúsculas. -->
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Ciudad</th>
                </tr>
            </thead>

            <!-- tbody: agrupa todas las filas de datos de la tabla.
                 El CSS aplica zebra striping (tr:nth-child(even)) para que
                 las filas pares tengan fondo amarillo suave, facilitando la
                 lectura horizontal. Al pasar el mouse, la fila se resalta en azul. -->
            <tbody>
                <tr>
                    <!-- td: celda de dato regular. El CSS le aplica borde y padding
                         para que el contenido no quede pegado a los bordes. -->
                    <td>Felipe Smith</td>
                    <td>33</td>
                    <td>Chicago</td>
                </tr>
            </tbody>

        </table>

    </main>

    <!-- ── FOOTER ──────────────────────────────────────────────────────
         Pie de página idéntico en todas las páginas del sitio.
         El CSS le aplica fondo negro y línea azul superior.
         ─────────────────────────────────────────────────────────────── -->
    <footer>
        Derechos Reservados Producciones h777
    </footer>

</body>
</html>
